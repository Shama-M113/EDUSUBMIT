<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Plagiarism Result</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: #f2f6fc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .result-card {
            background-color: white;
            padding: 40px 50px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .result-card h2 {
            color: #333;
            margin-bottom: 20px;
        }

        .result-card p {
            font-size: 18px;
            color: #555;
            margin-bottom: 30px;
        }

        .back-btn {
            display: inline-block;
            padding: 10px 20px;
            background-color: #4a90e2;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            transition: background-color 0.3s ease;
        }

        .back-btn:hover {
            background-color: #0f22b0;
        }
    </style>
</head>
<body>
    <div class="result-card">
        <h2>Plagiarism Result :</h2>
        <p>{{ plagiarism_result }}</p>
        <a href="{{ url_for('view_submissions', assignment_id=assignment_id) }}" class="back-btn">Back to Submissions</a>
    </div>
</body>
</html>
